name: Build OSXCross (macOS 10.13 High Sierra) Base Libs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    env:
      OSX_VERSION_MIN: "10.13"
      SDK_VERSION: "10.13"
      SDK_URL: "https://github.com/joseluisq/macosx-sdks/releases/download/10.13/MacOSX10.13.sdk.tar.xz"
      SDK_SHA256: "9d3eddc34a510198694f5ec7cfbdebaee4c0c7ba68ad1d957cb566649c9a0f84"
      UNATTENDED: "1"
      MACOSX_DEPLOYMENT_TARGET: "10.13"

    steps:
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake llvm-dev uuid-dev libssl-dev libxml2-dev patch make tar xz-utils bzip2 pbzip2 curl git

      - name: Prepare OSXCross and SDK
        run: |
          # 1. Клонирование
          git clone https://github.com/tpoechtrager/osxcross.git /tmp/osxcross
          
          # 2. Скачивание SDK ДО билда
          mkdir -p /tmp/osxcross/tarballs
          curl -fL -o /tmp/osxcross/tarballs/MacOSX${SDK_VERSION}.sdk.tar.xz "${SDK_URL}"
          
          # 3. Валидация SDK
          echo "${SDK_SHA256}  /tmp/osxcross/tarballs/MacOSX${SDK_VERSION}.sdk.tar.xz" | sha256sum --check -

      - name: Build OSXCross Toolchain
        run: |
          cd /tmp/osxcross
          # UNATTENDED=1 обеспечивает автоматическую распаковку SDK из tarballs/
          ./build.sh

      - name: Populate Dependencies
        run: |
          export PATH="/tmp/osxcross/target/bin:$PATH"
          cd /tmp/osxcross
          
          PKGS="pkgconfig zlib bzip2 libpng freetype fontconfig libxml2 openssl jpeg tiff x264 x265 lame libvpx xvid lcms2 openexr boost libsdl2 opus"
          
          for pkg in $PKGS; do
            echo "Processing $pkg..."
            # osxcross-macports умеет докачивать зависимости сам
            osxcross-macports install "$pkg" || osxcross-macports fake-install "$pkg"
          done

      - name: Sanitize and Compress
        run: |
          cd /tmp/osxcross
          rm -rf target/macports/software/*
          tar -I pbzip2 -cf /tmp/osxcross-10.13-toolchain.tar.bz2 target/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "10.13-build-${{ github.run_number }}"
          files: /tmp/osxcross-10.13-toolchain.tar.bz2
