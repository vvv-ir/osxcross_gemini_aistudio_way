name: Build OSXCross (macOS 10.13 High Sierra) Base Libs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    env:
      OSX_VERSION_MIN: "10.13"
      MACOSX_DEPLOYMENT_TARGET: "10.13"
      PATH: "/tmp/osxcross/target/bin:/usr/local/bin:/usr/bin:/bin"

    steps:
      - name: Install Build Deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake llvm-dev uuid-dev libssl-dev libxml2-dev patch make tar xz-utils bzip2 pbzip2 curl git

      - name: Build OSXCross
        run: |
          git clone https://github.com/tpoechtrager/osxcross.git /tmp/osxcross
          cd /tmp/osxcross
          # Предполагается, что SDK уже в /tmp/osxcross/tarballs
          ./build.sh

      - name: Populate Dependencies
        run: |
          cd /tmp/osxcross
          # Список пакетов
          PKGS="pkgconfig zlib bzip2 libpng freetype fontconfig libxml2 openssl jpeg tiff x264 x265 lame libvpx xvid lcms2 openexr boost libsdl2 opus"
          
          for pkg in $PKGS; do
            echo "Attempting to install $pkg..."
            # 1. Попытка установки бинарника
            if osxcross-macports install "$pkg"; then
              echo "$pkg installed successfully."
            else
              echo "$pkg binary not found, attempting manual build..."
              # 2. Попытка сборки из исходников, если доступен скрипт osxcross-build
              # Если скрипта нет, используется fake-install как крайняя мера
              osxcross-build "$pkg" || osxcross-macports fake-install "$pkg"
            fi
          done

      - name: Finalize
        run: |
          # Проверка критических файлов
          SYSROOT="/tmp/osxcross/target/macports/pkgs/opt/local"
          [ -d "$SYSROOT/include/openssl" ] && [ -d "$SYSROOT/include/boost" ] || exit 1
          
          cd /tmp/osxcross
          rm -rf target/macports/software/*
          tar -I pbzip2 -cf /tmp/osxcross-10.13-toolchain.tar.bz2 target/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/osxcross-10.13-toolchain.tar.bz2
